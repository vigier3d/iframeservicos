<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Serviços</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #0f172a;
        color: #fff;
    }

    header {
        text-align: center;
        padding: 15px;
        background: #1e293b;
        font-size: 20px;
        font-weight: bold;
    }

    nav {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        padding: 10px;
        background: #020617;
    }

    .btn {
        padding: 10px 15px;
        border: none;
        border-radius: 20px;
        background: linear-gradient(135deg, #3b82f6, #06b6d4);
        color: white;
        cursor: pointer;
        transition: 0.3s;
        font-size: 14px;
    }

    .btn:hover {
        transform: scale(1.05);
        opacity: 0.9;
    }

    .container {
        padding: 10px;
    }

    iframe {
        width: 100%;
        height: 70vh;
        border: none;
        border-radius: 10px;
        background: #fff;
    }

    footer {
        text-align: center;
        padding: 10px;
        font-size: 12px;
        background: #020617;
        color: #94a3b8;
    }

    @media (max-width: 600px) {
        iframe {
            height: 60vh;
        }

        .btn {
            font-size: 12px;
            padding: 8px 10px;
        }
    }
</style>
</head>

<body>

<header>
    🌐 Painel de Serviços Online
</header>

<nav>
    <button class="btn" onclick="carregar('clima')">🌦 Clima</button>
    <button class="btn" onclick="carregar('dolar')">💵 Dólar</button>
    <button class="btn" onclick="carregar('noticias')">📰 Notícias</button>
    <button class="btn" onclick="carregar('tradutor')">🌍 Tradutor</button>
    <button class="btn" onclick="carregar('mapa')">📍 Mapa</button>
</nav>

<div class="container">
    <iframe id="frame" src=""></iframe>
</div>

<footer id="info">
    Selecione um serviço acima para visualizar.
</footer>

<script>
function carregar(tipo) {
    const frame = document.getElementById("frame");
    const info = document.getElementById("info");

    if (tipo === "clima") {
        frame.src = "https://www.climatempo.com.br/";
        info.innerText = "Fonte: Climatempo - Informações meteorológicas";
    }

    if (tipo === "dolar") {
        frame.src = "https://www.bcb.gov.br/";
        info.innerText = "Fonte: Banco Central - Cotação do dólar";
    }

    if (tipo === "noticias") {
        frame.src = "https://g1.globo.com/";
        info.innerText = "Fonte: G1 - Portal de notícias";
    }

    if (tipo === "tradutor") {
        frame.src = "https://translate.google.com/";
        info.innerText = "Fonte: Google Translate - Tradução online";
    }

    if (tipo === "mapa") {
        frame.src = "https://www.google.com/maps";
        info.innerText = "Fonte: Google Maps - Localização";
    }
}
</script>

</body>
</html>
